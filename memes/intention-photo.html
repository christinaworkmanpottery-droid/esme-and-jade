<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.meme {
  width: 1080px; height: 1080px;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  font-family: Georgia, serif;
}
.bg {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('https://images.unsplash.com/photo-1508672019048-805c876b67e2?w=1080&h=1080&fit=crop');
  background-size: cover; background-position: center;
}
.overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15,12,41,0.62);
}
.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; height: 100%;
  padding: 65px 75px 50px;
  box-sizing: border-box;
}
.tag {
  font-size: 15px; color: #d4af37;
  letter-spacing: 5px; text-transform: uppercase;
  font-family: Arial, sans-serif; margin-bottom: 15px;
}
.title {
  font-size: 48px; color: #E8B4B8;
  line-height: 1.2; margin-bottom: 45px;
  text-shadow: 0 2px 15px rgba(0,0,0,0.4);
}
.steps {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; gap: 30px;
}
.step {
  display: flex; align-items: center; gap: 20px;
}
.step-icon {
  width: 50px; height: 50px;
  border: 2px solid rgba(212,175,55,0.4);
  border-radius: 50%; display: flex;
  align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  color: #d4af37;
}
.step-text {
  font-size: 26px; color: #E8B4B8;
  font-family: Arial, sans-serif; line-height: 1.4;
  text-shadow: 0 1px 8px rgba(0,0,0,0.3);
}
.divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
  margin: 25px 0;
}
.bottom { margin-top: auto; }
.brand {
  font-size: 18px; color: #E8B4B8;
  letter-spacing: 5px; text-transform: uppercase;
  font-family: Arial, sans-serif;
}
.handle {
  font-size: 14px; color: rgba(232,180,184,0.5);
  letter-spacing: 2px; margin-top: 8px;
  font-family: Arial, sans-serif;
}
</style></head><body>
<div class="meme">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="tag">☽ Ritual</div>
    <div class="title">Set Your Intention</div>
    <div class="steps">
      <div class="step"><div class="step-icon">🤲</div><div class="step-text">Hold your crystal</div></div>
      <div class="step"><div class="step-icon">🌙</div><div class="step-text">Close your eyes</div></div>
      <div class="step"><div class="step-icon">🗣️</div><div class="step-text">Speak your intention out loud</div></div>
      <div class="step"><div class="step-icon">✨</div><div class="step-text">Feel it as if it's already true</div></div>
      <div class="step"><div class="step-icon">💎</div><div class="step-text">Carry the crystal with you</div></div>
    </div>
    <div class="bottom">
      <div class="divider"></div>
      <div class="brand">ESME & JADE</div>
      <div class="handle">@esmeandjadejewelry</div>
    </div>
  </div>
</div>
</body></html>
