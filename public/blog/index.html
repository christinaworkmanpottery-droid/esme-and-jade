<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Esme & Jade</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .blog-container { max-width:720px; margin:0 auto; padding:100px 20px 60px; }
        .blog-header { text-align:center; margin-bottom:40px; }
        .blog-header h1 { font-family:'Playfair Display',serif; font-size:2.5em; color:#1a1525; }
        .blog-header p { font-family:'Inter',sans-serif; color:#888; margin-top:8px; }
        .post-card { background:#fff; border:1px solid #e8d8f0; border-radius:12px; padding:24px; margin-bottom:20px; transition:all 0.3s; }
        .post-card:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(155,89,182,0.1); border-color:#9B59B6; }
        .post-card h2 { font-family:'Playfair Display',serif; font-size:1.4em; color:#1a1525; margin-bottom:8px; }
        .post-card h2 a { color:inherit; text-decoration:none; }
        .post-card h2 a:hover { color:#9B59B6; }
        .post-meta { font-family:'Inter',sans-serif; font-size:0.85em; color:#999; margin-bottom:12px; }
        .post-excerpt { font-family:'Inter',sans-serif; color:#555; line-height:1.6; }
        .read-more { color:#9B59B6; text-decoration:none; font-weight:500; margin-top:10px; display:inline-block; font-family:'Inter',sans-serif; }
        .back-link { color:#9B59B6; text-decoration:none; font-size:0.9em; font-family:'Inter',sans-serif; }
        .footer-brand { text-align:center; margin-top:40px; font-family:'Inter',sans-serif; font-size:0.8em; color:#9B59B6; letter-spacing:3px; text-transform:uppercase; }
    </style>
</head>
<body>
<div class="blog-container">
    <a href="/" class="back-link">← Home</a>
    <div class="blog-header">
        <h1>💎 Blog</h1>
        <p>Astrology, intention, and beautiful living</p>
    </div>
    <div id="blogList">Loading...</div>
    <div class="footer-brand">💎 Esme & Jade 💎</div>
</div>
<script>
fetch('/blog/posts.json')
  .then(r => r.json())
  .then(posts => {
    const el = document.getElementById('blogList');
    if (!posts.length) { el.innerHTML = '<p style="color:#999;text-align:center">No posts yet. Check back soon!</p>'; return; }
    el.innerHTML = posts.filter(p => p.published).map(p =>
      '<div class="post-card">' +
      '<h2><a href="/blog/' + p.slug + '.html">' + p.title + '</a></h2>' +
      '<div class="post-meta">' + new Date(p.created_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}) + '</div>' +
      '<div class="post-excerpt">' + p.excerpt + '</div>' +
      '<a href="/blog/' + p.slug + '.html" class="read-more">Read more →</a>' +
      '</div>'
    ).join('');
  })
  .catch(() => { document.getElementById('blogList').innerHTML = '<p style="color:#999">Could not load posts.</p>'; });
</script>
</body>
</html>
